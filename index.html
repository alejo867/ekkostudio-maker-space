<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booth Layout</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .booth {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            flex-direction: column;
            position: relative;
            width: 100%;
            height: 100vh;
        }
        .station {
            width: 150px;
            height: 150px;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            box-shadow: 5px 5px 15px #b8b8b8, -5px -5px 15px #ffffff;
            margin: 20px;
            transform: rotate(90deg);
            position: relative;
        }
        .aisle {
            width: 100%;
            height: 100%;
            background-color: transparent;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border: 2px dashed #ccc;
        }
    </style>
</head>
<body>
    <div class="booth">
        <div class="aisle"></div>
        <div class="station" style="background-color: #f0f0f0;">Station 1</div>
        <div class="station" style="background-color: #e8e8e8;">Station 2</div>
        <div class="station" style="background-color: #fff4e6;">Station 3</div>
        <div class="station" style="background-color: #e6f7ff;">Station 4</div>
    </div>
</body>
</html>
