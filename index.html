<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Maker Space</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="makerSpaceContainer" style="width: 100%; height: 100vh;"></div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('makerSpaceContainer').appendChild(renderer.domElement);

        // Aisle
        const aisleGeometry = new THREE.BoxGeometry(2, 1, 10);
        const aisleMaterial = new THREE.MeshBasicMaterial({color: 0xCCCCCC});
        const aisle = new THREE.Mesh(aisleGeometry, aisleMaterial);
        aisle.position.z = 0;
        scene.add(aisle);

        // Stations
        const stations = [
            { name: '3D Printing', position: [-4.0, 0, 0], rotation: Math.PI / 2 },
            { name: 'Clay Jewelry', position: [2.0, 0, 0], rotation: Math.PI / 2 },
            { name: 'Cricut', position: [0.5, 0, 0], rotation: Math.PI / 2 },
            { name: 'Candles', position: [2.5, 0, 0], rotation: Math.PI / 2 }
        ];

        stations.forEach(station => {
            const stationGeometry = new THREE.BoxGeometry(1, 1, 1);
            const stationMaterial = new THREE.MeshBasicMaterial({color: 0x008000});
            const stationMesh = new THREE.Mesh(stationGeometry, stationMaterial);
            stationMesh.position.set(...station.position);
            stationMesh.rotation.y = station.rotation;
            scene.add(stationMesh);
        });

        // Lighting
        const light = new THREE.AmbientLight(0x404040);
        scene.add(light);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 10, 10);
        scene.add(directionalLight);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
