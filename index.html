<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EkkoStudio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;overflow:hidden;font-family:system-ui,sans-serif;}
#c{display:block;width:100vw;height:100vh;}

#errBox{display:none;position:fixed;inset:0;background:#000;color:#f55;
  z-index:9999;padding:40px;font-family:monospace;font-size:13px;
  white-space:pre-wrap;overflow:auto;}

/* INTRO — pointer-events:none so canvas click always reaches canvas */
#intro{position:fixed;inset:0;z-index:1000;background:#0d0a07;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.2s ease;
  pointer-events:none;} /* ← KEY FIX: never blocks clicks to canvas */
.logo{font-size:clamp(3rem,9vw,6.5rem);font-weight:900;letter-spacing:.15em;
  text-transform:uppercase;color:#f2ead8;margin-bottom:.15em;}
.logo em{color:#c4622d;font-style:normal;}
.sub{font-size:.78rem;letter-spacing:.32em;text-transform:uppercase;
  color:#5a4030;margin-bottom:2.5rem;}
.keys{display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem 1.6rem;
  margin-bottom:1.8rem;max-width:310px;}
.krow{display:flex;align-items:center;gap:.5rem;color:#a08060;font-size:.76rem;}
kbd{background:#1e1408;border:1px solid #4a2e10;border-radius:4px;
  padding:2px 7px;font-family:monospace;font-size:.76em;color:#e8a030;}
.note{color:#3a2818;font-size:.7rem;}

/* HUD */
#hud{position:fixed;top:14px;left:14px;z-index:500;
  display:flex;flex-direction:column;gap:7px;}
.hb{background:rgba(12,8,4,.9);border:1px solid #4a3020;color:#c0a878;
  padding:6px 15px;border-radius:6px;font-size:.74rem;letter-spacing:.05em;
  cursor:pointer;font-family:inherit;transition:.15s;}
.hb:hover{border-color:#c4622d;color:#e8a030;}

#sname{position:fixed;top:14px;left:50%;transform:translateX(-50%);
  font-size:1.1rem;font-weight:900;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(242,234,216,.38);z-index:500;pointer-events:none;}
#sname em{color:#c4622d;font-style:normal;}

#tourBtn{position:fixed;bottom:20px;right:20px;z-index:500;
  background:rgba(12,8,4,.9);border:1px solid #c4622d;color:#e8a030;
  padding:9px 18px;border-radius:7px;font-size:.74rem;letter-spacing:.07em;
  cursor:pointer;font-family:inherit;transition:.15s;}
#tourBtn:hover,#tourBtn.on{background:rgba(196,98,45,.2);}

#banner{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(12,8,4,.9);border:1px solid #c4622d;color:#e8a030;
  padding:9px 22px;border-radius:30px;font-size:.76rem;z-index:800;
  pointer-events:none;letter-spacing:.05em;}

#prompt{display:none;position:fixed;bottom:66px;left:50%;transform:translateX(-50%);
  background:rgba(12,8,4,.9);border:1px solid #6a4020;color:#f2ead8;
  padding:8px 20px;border-radius:20px;font-size:.76rem;z-index:700;pointer-events:none;}

#tlabel{display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-90px);
  font-size:1.8rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
  color:#e8a030;pointer-events:none;z-index:600;
  text-shadow:0 2px 30px rgba(232,160,48,.5);}

#xh{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:600;}
#xh::before,#xh::after{content:'';position:absolute;background:rgba(255,255,255,.55);}
#xh::before{width:14px;height:1px;top:0;left:-7px;}
#xh::after{width:1px;height:14px;top:-7px;left:0;}

/* MINIMAP */
#mm{position:fixed;top:14px;right:14px;z-index:500;
  border:1px solid #4a3020;border-radius:7px;overflow:hidden;
  background:#0a0806;width:130px;height:130px;}
#mmLbl{position:absolute;top:3px;left:0;right:0;text-align:center;
  color:#c4622d;font-size:.54rem;letter-spacing:.13em;pointer-events:none;}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:2000;align-items:center;justify-content:center;}
#modal.open{display:flex;}
#mbox{background:#130f0a;border:1px solid #5a3820;border-radius:12px;
  width:min(470px,92vw);max-height:86vh;overflow-y:auto;padding:26px 24px;
  position:relative;box-shadow:0 0 60px rgba(196,98,45,.12);}
#mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#c4622d,#e8a030,transparent);
  border-radius:12px 12px 0 0;}
.ms{font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;
  color:#c4622d;margin-bottom:.28em;}
.mt{font-size:1.85rem;font-weight:900;letter-spacing:.07em;text-transform:uppercase;
  color:#f2ead8;margin-bottom:.25em;}
.md{color:#8a9aaa;font-size:.8rem;line-height:1.6;margin-bottom:1.3rem;}
.mp{display:flex;flex-direction:column;gap:9px;}
.mpr{background:#1e1610;border:1px solid #3a2618;border-radius:8px;
  padding:12px 14px;display:flex;justify-content:space-between;
  align-items:center;gap:12px;transition:border-color .2s;}
.mpr:hover{border-color:#c4622d;}
.pname{color:#f2ead8;font-size:.84rem;font-weight:600;margin-bottom:.13em;}
.pdesc{color:#6a5a48;font-size:.71rem;line-height:1.4;}
.pright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.pprice{color:#e8a030;font-size:.86rem;font-weight:600;white-space:nowrap;}
.pbtn{background:#c4622d;color:#fff;border:none;border-radius:5px;
  padding:5px 11px;font-size:.69rem;cursor:pointer;white-space:nowrap;font-family:inherit;}
.pbtn:hover{background:#d47240;}
#mcls{position:absolute;top:11px;right:14px;background:none;border:none;
  color:#5a4a38;font-size:1.2rem;cursor:pointer;}
#mcls:hover{color:#f2ead8;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="errBox"></div>

<div id="intro">
  <div class="logo">Ekko<em>Studio</em></div>
  <div class="sub">Creative Maker's Space · Redmond, WA</div>
  <div class="keys">
    <div class="krow"><kbd>W A S D</kbd> Move</div>
    <div class="krow"><kbd>Mouse</kbd> Look</div>
    <div class="krow"><kbd>Shift</kbd> Sprint</div>
    <div class="krow"><kbd>E / Click</kbd> Interact</div>
    <div class="krow"><kbd>R</kbd> Reset</div>
    <div class="krow"><kbd>ESC</kbd> Unlock</div>
  </div>
  <div class="note">👆 Click the scene to activate mouse-look &amp; audio</div>
</div>

<div id="banner">👆 Click scene to enable mouse-look + audio</div>
<div id="sname">Ekko<em>Studio</em></div>
<div id="xh"></div>
<div id="prompt"></div>
<div id="tlabel"></div>

<div id="hud">
  <button class="hb" id="resetBtn">↺ Reset (R)</button>
  <button class="hb" id="soundBtn">♪ Sound</button>
</div>
<button id="tourBtn">✦ Guided Tour</button>

<div id="mm">
  <canvas id="mmC" width="126" height="126"></canvas>
  <div id="mmLbl">STUDIO MAP</div>
</div>

<div id="modal">
  <div id="mbox">
    <button id="mcls">✕</button>
    <div class="ms" id="mst"></div>
    <div class="mt" id="mti"></div>
    <div class="md" id="mde"></div>
    <div class="mp" id="mpr"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
'use strict';

window.onerror = function(m,s,l,c,e){
  var b = document.getElementById('errBox');
  b.style.display = 'block';
  b.textContent = 'ERROR: '+m+'\n'+s+':'+l+'\n'+(e ? e.stack : '');
};

// ─── STATION DATA ────────────────────────────────────────────────────────────
var STATIONS = [
  { id:0, name:'3D Printing',    icon:'🖨',  col:0x2a7fc4, hex:'#2a7fc4',
    pos:{x:-2.8, z:-2.0},
    desc:'Precision FDM & resin prints — custom parts, art pieces, and functional prototypes made to order.',
    products:[
      {name:'Custom Miniature Figure', price:'$24', desc:'Detailed resin print. Specify your design or character.'},
      {name:'Geometric Planter 6"',    price:'$18', desc:'PLA with food-safe coating. Multiple colorways.'},
      {name:'Personalized Keychain ×3',price:'$9',  desc:'Name or logo in durable PETG. Pack of 3.'},
    ]
  },
  { id:1, name:'Clay Jewelry',   icon:'🪨',  col:0xc47a3a, hex:'#c47a3a',
    pos:{x:2.8, z:-2.0},
    desc:'Handcrafted polymer clay earrings, pendants, and statement pieces. Every piece is one of a kind.',
    products:[
      {name:'Terrazzo Stud Earrings',   price:'$16', desc:'Lightweight clay with gold leaf flecks. Hypoallergenic posts.'},
      {name:'Abstract Pendant Necklace',price:'$28', desc:'Sculptural focal piece on an 18" gold-fill chain.'},
      {name:'Clay Ring Set ×3',          price:'$22', desc:'Stacking rings in earth tones. One-size adjustable.'},
    ]
  },
  { id:2, name:'Cricut Designs', icon:'✂',  col:0x2ab89a, hex:'#2ab89a',
    pos:{x:-2.8, z:2.0},
    desc:'Precision-cut vinyl decals, iron-on graphics, and custom paper crafts with a personal touch.',
    products:[
      {name:'Custom Vinyl Decal',         price:'$8',  desc:'Weather-resistant outdoor vinyl. Up to 6". Choose your design.'},
      {name:'Iron-On Shirt Graphic',      price:'$14', desc:'HTV transfer for standard tee. Provide art or choose from ours.'},
      {name:'Personalized Gift Box Wrap', price:'$12', desc:'Scored & cut kraft paper with custom name or message.'},
    ]
  },
  { id:3, name:'Candle Making',  icon:'🕯',  col:0xe8c040, hex:'#e8c040',
    pos:{x:2.8, z:2.0},
    desc:'Hand-poured soy and coconut wax candles. Clean burns, complex scents, beautiful vessels worth keeping.',
    products:[
      {name:'Signature Soy Candle 8oz', price:'$22', desc:'Cedar + tonka bean. 45-hr burn. Amber glass vessel.'},
      {name:'Mini Tin Set 3×2oz',       price:'$18', desc:'Three seasonal scents: citrus, smoke, vanilla. Travel-friendly.'},
      {name:'Custom Scent Blend',       price:'$30', desc:'Design your own fragrance. 8oz pour, made to order.'},
    ]
  },
];

// ─── RENDERER ────────────────────────────────────────────────────────────────
var canvas = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

window.addEventListener('resize', function() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

// ─── SCENE + CAMERA ──────────────────────────────────────────────────────────
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0a07);
scene.fog = new THREE.Fog(0x0d0a07, 10, 22);

var cam = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.05, 30);
cam.rotation.order = 'YXZ';

// Start outside the door, facing into the room (door is at z=+5)
var START_X=0, START_Y=1.72, START_Z=6.5, START_YAW=Math.PI;
cam.position.set(START_X, START_Y, START_Z);
cam.rotation.set(0, START_YAW, 0);

// ─── PLAYER STATE ────────────────────────────────────────────────────────────
var pyaw = START_YAW, ppitch = 0;
var px = START_X, py = START_Y, pz = START_Z;

var keys = {};
document.addEventListener('keydown', function(e){ keys[e.code] = true; });
document.addEventListener('keyup',   function(e){ keys[e.code] = false; });

function resetPlayer() {
  px=START_X; py=START_Y; pz=START_Z;
  pyaw=START_YAW; ppitch=0;
  cam.position.set(px,py,pz);
  cam.rotation.set(0,pyaw,0);
  stopTour();
}
document.getElementById('resetBtn').addEventListener('click', resetPlayer);
document.addEventListener('keydown', function(e){ if(e.code==='KeyR') resetPlayer(); });

// ─── POINTER LOCK ────────────────────────────────────────────────────────────
// FIX: mousemove runs whenever locked=true, regardless of intro state.
// introGone only gates the "open catalog on click" action, not camera look.
var locked = false;
var banner = document.getElementById('banner');

canvas.addEventListener('click', function() {
  startAudio();
  if (!locked) {
    var req = canvas.requestPointerLock();
    if (req && req.catch) req.catch(function(){});
  }
});

document.addEventListener('pointerlockchange', function() {
  locked = document.pointerLockElement === canvas;
  // Show/hide banner whenever lock state changes
  banner.style.display = locked ? 'none' : 'block';
});

// FIX: NO introGone check here — mouse always works once pointer lock is active
document.addEventListener('mousemove', function(e) {
  if (!locked) return;
  pyaw   -= e.movementX * 0.002;
  ppitch -= e.movementY * 0.002;
  ppitch = Math.max(-1.1, Math.min(1.1, ppitch));
  cam.rotation.set(ppitch, pyaw, 0);
});

// ─── INTRO ───────────────────────────────────────────────────────────────────
// Intro is purely visual (pointer-events:none in CSS), never blocks interaction.
// We still fade it out so the room becomes visible.
var introGone = false;
var introEl = document.getElementById('intro');
setTimeout(function() {
  introEl.style.opacity = '0';
  setTimeout(function() {
    introEl.style.display = 'none';
    introGone = true;
  }, 1200);
}, 4000);

// ─── AUDIO ───────────────────────────────────────────────────────────────────
var actx, masterGain, audioStarted=false, soundOn=true;
function startAudio() {
  if (audioStarted || !soundOn) return;
  audioStarted = true;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = actx.createGain(); masterGain.gain.value = 0.04;
    masterGain.connect(actx.destination);
    var buf = actx.createBuffer(1, actx.sampleRate*3, actx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i=0; i<d.length; i++) d[i] = Math.random()*2-1;
    var ns = actx.createBufferSource(); ns.buffer=buf; ns.loop=true;
    var lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=180;
    ns.connect(lp); lp.connect(masterGain); ns.start();
    var hm=actx.createOscillator(), hg=actx.createGain();
    hm.frequency.value=60; hg.gain.value=0.005;
    hm.connect(hg); hg.connect(masterGain); hm.start();
    var sc=[196,220,261,329,392]; var si=0;
    (function nt(){
      if(!soundOn||!actx) return;
      if(Math.random()>0.4){
        var o=actx.createOscillator(), g=actx.createGain();
        o.type='triangle'; o.frequency.value=sc[si++%sc.length];
        g.gain.setValueAtTime(0,actx.currentTime);
        g.gain.linearRampToValueAtTime(0.01,actx.currentTime+0.1);
        g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+1.5);
        o.connect(g); g.connect(masterGain); o.start(); o.stop(actx.currentTime+1.7);
      }
      setTimeout(nt, 1000+Math.random()*2200);
    })();
  } catch(e){ console.warn('audio',e); }
}
document.getElementById('soundBtn').addEventListener('click', function(){
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '♪ Sound' : '♪ Muted';
  if (masterGain) masterGain.gain.value = soundOn ? 0.04 : 0;
  if (soundOn && !audioStarted) startAudio();
});

// ─── PROCEDURAL TEXTURES ─────────────────────────────────────────────────────
function makeBrickTex() {
  var cv=document.createElement('canvas'); cv.width=512; cv.height=256;
  var cx=cv.getContext('2d');
  cx.fillStyle='#221208'; cx.fillRect(0,0,512,256);
  var BW=60, BH=28, M=3;
  for (var row=0; row<12; row++) {
    var off=(row%2)*30;
    for (var col=-1; col<10; col++) {
      var rv=80+Math.floor(Math.random()*40), gv=24+Math.floor(Math.random()*16);
      cx.fillStyle='rgb('+rv+','+gv+',14)';
      cx.fillRect(col*BW+off+M, row*BH+M, BW-M*2, BH-M*2);
    }
  }
  var t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(3,2.5); return t;
}
function makeFloorTex() {
  var cv=document.createElement('canvas'); cv.width=512; cv.height=512;
  var cx=cv.getContext('2d');
  cx.fillStyle='#1a1610'; cx.fillRect(0,0,512,512);
  for (var i=0; i<7000; i++) {
    var v=Math.random()*30-15;
    cx.fillStyle='rgba('+(88+v)+','+(78+v)+','+(60+v)+',0.11)';
    cx.fillRect(Math.random()*512,Math.random()*512,Math.random()*3,Math.random()*3);
  }
  cx.strokeStyle='rgba(6,4,2,0.5)'; cx.lineWidth=1;
  for (var g=0; g<512; g+=62) {
    cx.beginPath(); cx.moveTo(g,0); cx.lineTo(g,512); cx.stroke();
    cx.beginPath(); cx.moveTo(0,g); cx.lineTo(512,g); cx.stroke();
  }
  var t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(4,4); return t;
}
function makeWoodTex() {
  var cv=document.createElement('canvas'); cv.width=256; cv.height=256;
  var cx=cv.getContext('2d');
  cx.fillStyle='#6a4018'; cx.fillRect(0,0,256,256);
  for (var i=0; i<55; i++) {
    var v=Math.random()*16-8;
    cx.strokeStyle='rgba('+(48+v)+','+(26+v)+','+(8+v)+',0.32)';
    cx.lineWidth=0.9+Math.random()*1.2;
    cx.beginPath(); cx.moveTo(0,i*4.7+Math.random()*3);
    cx.lineTo(256,i*4.7+Math.random()*3); cx.stroke();
  }
  var t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,2); return t;
}

var brickTex = makeBrickTex();
var floorTex = makeFloorTex();
var woodTex  = makeWoodTex();

var matBrick = new THREE.MeshStandardMaterial({map:brickTex, roughness:.92, metalness:.02});
var matFloor = new THREE.MeshStandardMaterial({map:floorTex, roughness:.87, metalness:.04});
var matCeil  = new THREE.MeshStandardMaterial({color:0x141210, roughness:.95});
var matMetal = new THREE.MeshStandardMaterial({color:0x484030, roughness:.45, metalness:.78});
var matBeam  = new THREE.MeshStandardMaterial({color:0x252018, roughness:.65, metalness:.55});
var matWood  = new THREE.MeshStandardMaterial({map:woodTex,  roughness:.82, metalness:.04, color:0xb87830});

// ─── ROOM GEOMETRY ──────────────────────────────────────────────────────────
// Compact: 10 wide × 12 deep × 3.4 tall.  Door at z=+6 (front face).
var RW=10, RD=12, RH=3.4;
var DW=2.0, DH=2.5;   // door width, door height

function addBox(w,h,d, x,y,z, mat, cast, recv) {
  var m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z);
  if(cast!==false) m.castShadow=true;
  if(recv!==false) m.receiveShadow=true;
  scene.add(m); return m;
}

// Floor & ceiling
var floorMesh=new THREE.Mesh(new THREE.PlaneGeometry(RW,RD),matFloor);
floorMesh.rotation.x=-Math.PI/2; floorMesh.receiveShadow=true; scene.add(floorMesh);
var ceilMesh=new THREE.Mesh(new THREE.PlaneGeometry(RW,RD),matCeil);
ceilMesh.rotation.x=Math.PI/2; ceilMesh.position.y=RH; scene.add(ceilMesh);

// Walls
addBox(RW, RH, 0.2,  0, RH/2, -RD/2,  matBrick); // back
addBox(0.2,RH, RD, -RW/2, RH/2, 0,    matBrick); // left
addBox(0.2,RH, RD,  RW/2, RH/2, 0,    matBrick); // right

// Front wall with door gap
var sw=(RW-DW)/2;
addBox(sw, RH, 0.2, -(RW/2)+sw/2, RH/2, RD/2, matBrick, false);
addBox(sw, RH, 0.2,  (RW/2)-sw/2, RH/2, RD/2, matBrick, false);
addBox(DW, RH-DH, 0.2, 0, DH+(RH-DH)/2, RD/2, matBrick, false);

// Steel door frame
addBox(0.1, DH, 0.18, -DW/2, DH/2, RD/2, matMetal, false);
addBox(0.1, DH, 0.18,  DW/2, DH/2, RD/2, matMetal, false);
addBox(DW+0.12, 0.1, 0.18, 0, DH, RD/2,  matMetal, false);

// Base trim
addBox(RW, 0.09, 0.08,  0,    0.045, -RD/2,  matMetal, false);
addBox(0.08,0.09, RD, -RW/2, 0.045, 0,       matMetal, false);
addBox(0.08,0.09, RD,  RW/2, 0.045, 0,       matMetal, false);

// I-beams
for (var bz=-4; bz<=4; bz+=3) {
  addBox(RW, 0.18, 0.09, 0, RH-0.09, bz, matBeam);
  addBox(RW, 0.05, 0.2,  0, RH-0.21, bz, matBeam, false);
  addBox(RW, 0.05, 0.2,  0, RH,      bz, matBeam, false);
}

// ── Honeycomb LED fixture (ceiling, matching reference image) ────────────────
var ledMat = new THREE.MeshStandardMaterial({
  color:0xffffff, emissive:0xddf0ff, emissiveIntensity:2.8, roughness:.2
});
// 7-hex cluster centred at (0, RH-0.01, -1.5)
var hexCtrs = [[0,0],[1.05,0],[-1.05,0],[0.525,0.91],[-0.525,0.91],[0.525,-0.91],[-0.525,-0.91]];
hexCtrs.forEach(function(hc) {
  var hx=hc[0]*0.85, hz=hc[1]*0.85-1.5;
  for (var s=0; s<6; s++) {
    var a0=(s/6)*Math.PI*2, a1=((s+1)/6)*Math.PI*2, r=0.48;
    var mx=(Math.cos(a0)+Math.cos(a1))/2*r+hx;
    var mz=(Math.sin(a0)+Math.sin(a1))/2*r+hz;
    var segLen = r * Math.sqrt(2*(1-Math.cos(Math.PI/3)));
    var ang = Math.atan2(Math.sin(a1)-Math.sin(a0), Math.cos(a1)-Math.cos(a0));

var TABLES=STATIONS.map(function(s) {
  return {minX:s.pos.x-1.35, maxX:s.pos.x+1.35, minZ:s.pos.z-0.75, maxZ:s.pos.z+0.75};

function isBlocked(nx,nz) {
  for (var i=0; i<TABLES.length; i++) {
    var t=TABLES[i];
    if (nx>t.minX-0.28 && nx<t.maxX+0.28 && nz>t.minZ-0.28 && nz<t.maxZ+0.28) return true;

}

// ─── GUIDED TOUR ─────────────────────────────────────────────────────────────
var tourActive=false, tourLerping=false, tourTimer=null;
var tourIdx=0;
var tgtX=0, tgtZ=0, tgtYaw=0;
var TOUR_STOPS=STATIONS.map(function(st,i) {
  return {x:viewPts[i].x, z:viewPts[i].z, yaw:viewPts[i].yaw, label:st.name};
}).concat([{x:START_X, z:START_Z, yaw:START_YAW, label:''}]);

var tourBtn=document.getElementById('tourBtn');
tourBtn.addEventListener('click', function() { tourActive ? stopTour() : startTour(); });

function startTour() {
  tourActive=true; tourIdx=0;
  tourBtn.textContent='✕ Stop Tour'; tourBtn.classList.add('on');
  if (document.exitPointerLock) document.exitPointerLock();
  gotoStop(0);
}
function stopTour() {
  tourActive=false; tourLerping=false; clearTimeout(tourTimer);
  tourBtn.textContent='✦ Guided Tour'; tourBtn.classList.remove('on');
  document.getElementById('tlabel').style.display='none';
}
function gotoStop(i) {
  if (!tourActive||i>=TOUR_STOPS.length) { stopTour(); return; }
  var s=TOUR_STOPS[i];
  tgtX=s.x; tgtZ=s.z; tgtYaw=s.yaw; tourLerping=true;
  var tl=document.getElementById('tlabel');
  tl.style.display=s.label?'block':'none'; tl.textContent=s.label||'';
  tourTimer=setTimeout(function(){
    tourLerping=false;
    if (i<STATIONS.length) tourTimer=setTimeout(function(){gotoStop(i+1);},3000);
    else stopTour();
  }, 1600);
}

  modal.classList.add('open');
}

// ─── RAYCASTING ──────────────────────────────────────────────────────────────
var ray=new THREE.Raycaster();
var C2=new THREE.Vector2(0,0);
var promptEl=document.getElementById('prompt');
var hovSid=-1;

canvas.addEventListener('click', function() {
  // Only open catalog if locked; introGone not required for this
  if (!locked) return;
  if (hovSid>=0) openCatalog(hovSid);
});
document.addEventListener('keydown', function(e) {
  if (e.code==='KeyE'&&hovSid>=0&&!modal.classList.contains('open')) openCatalog(hovSid);
});

// ─── MOVEMENT ────────────────────────────────────────────────────────────────
var mv=new THREE.Vector3(), yQ=new THREE.Quaternion();
var clk=new THREE.Clock();

function updateMove(dt) {
  if (tourActive && tourLerping) {
    var f=Math.min(1,dt*3.0);
    px += (tgtX-px)*f; pz += (tgtZ-pz)*f;
    var dy=tgtYaw-pyaw;
    while(dy> Math.PI) dy-=Math.PI*2;
    while(dy<-Math.PI) dy+=Math.PI*2;
    pyaw   += dy*f*1.8;
    ppitch += (0-ppitch)*f;
    cam.position.set(px,py,pz);
    cam.rotation.set(ppitch,pyaw,0);
    return;
  }
  if (tourActive) return;

  var spd=(keys['ShiftLeft']||keys['ShiftRight'])?5.5:2.8;
  mv.set(0,0,0);
  if(keys['KeyW']||keys['ArrowUp'])    mv.z-=1;
  if(keys['KeyS']||keys['ArrowDown'])  mv.z+=1;
  if(keys['KeyA']||keys['ArrowLeft'])  mv.x-=1;
  if(keys['KeyD']||keys['ArrowRight']) mv.x+=1;
  if(mv.lengthSq()>0) mv.normalize();

  yQ.setFromAxisAngle(new THREE.Vector3(0,1,0), pyaw);
  mv.applyQuaternion(yQ);

  var nx=px+mv.x*spd*dt, nz=pz+mv.z*spd*dt;
  nx=Math.max(BOUNDS.minX, Math.min(BOUNDS.maxX, nx));
  nz=Math.max(BOUNDS.minZ, Math.min(BOUNDS.maxZ, nz));
  if (!isBlocked(nx,nz)) { px=nx; pz=nz; }
  cam.position.set(px,py,pz);
  cam.rotation.set(ppitch,pyaw,0);
}

// ─── MINIMAP ─────────────────────────────────────────────────────────────────
var mmC2=document.getElementById('mmC');
var mmX=mmC2.getContext('2d');
var MM=126, MR=16, MO=-8;   // covers -8..+8 in both axes (tight room)
function w2m(wx,wz){return{mx:(wx-MO)/MR*MM, my:(wz-MO)/MR*MM};}

function drawMap() {
  mmX.clearRect(0,0,MM,MM);
  mmX.fillStyle='#0a0806'; mmX.fillRect(0,0,MM,MM);
  var r1=w2m(-RW/2,-RD/2), r2=w2m(RW/2,RD/2);
  mmX.fillStyle='#181008'; mmX.fillRect(r1.mx,r1.my,r2.mx-r1.mx,r2.my-r1.my);
  mmX.strokeStyle='#3a2010'; mmX.lineWidth=1;
  mmX.strokeRect(r1.mx,r1.my,r2.mx-r1.mx,r2.my-r1.my);
  STATIONS.forEach(function(st) {
    var p=w2m(st.pos.x-1.25,st.pos.z-0.72);
    var bw=(2.5/MR)*MM, bh=(1.44/MR)*MM;
    mmX.fillStyle='#'+st.col.toString(16).padStart(6,'0')+'a0';
    mmX.fillRect(p.mx,p.my,bw,bh);
    var lp=w2m(st.pos.x,st.pos.z);
    mmX.fillStyle='#f2ead8'; mmX.font='5px sans-serif'; mmX.textAlign='center';
    mmX.fillText(st.name.split(' ')[0],lp.mx,lp.my+2);
  });
  var pp=w2m(px,pz);
  mmX.fillStyle='#c4622d';
  mmX.beginPath(); mmX.arc(pp.mx,pp.my,3.5,0,Math.PI*2); mmX.fill();
  mmX.strokeStyle='#e8a030'; mmX.lineWidth=1.5;
  mmX.beginPath(); mmX.moveTo(pp.mx,pp.my);
  var da=(4.5/MR)*MM;
  mmX.lineTo(pp.mx+Math.sin(pyaw)*da*0.6, pp.my+Math.cos(pyaw)*da*0.6);
  mmX.stroke();
}

// ─── MAIN LOOP ───────────────────────────────────────────────────────────────
var t=0;
function animate() {
  requestAnimationFrame(animate);
  var dt=Math.min(clk.getDelta(),0.05);
  t+=dt;

  updateMove(dt);

  // Raycasting (hover detection)
  ray.setFromCamera(C2,cam);
  var hits=ray.intersectObjects(hitMeshes);
  if (hits.length>0) {
    var sid=hits[0].object.userData.sid;
    if (hovSid!==sid) {
      hovSid=sid;
      var st2=STATIONS[sid];
      promptEl.style.display='block';
      promptEl.textContent=st2.icon+' '+st2.name+' — Press E or click to view catalog';
      canvas.style.cursor='pointer';
    }
  } else {
    if (hovSid>=0) {
      hovSid=-1;
      promptEl.style.display='none';
      canvas.style.cursor='crosshair';
    }
  }

  // Candle flame flicker
  flameMeshes.forEach(function(f,i) {
    f.material.emissiveIntensity = 3.0+Math.sin(t*10+i*2.2)*0.9;
  });

  drawMap();
  renderer.render(scene,cam);
}
animate();
</script>
